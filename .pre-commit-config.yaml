# fast.docs — pre-commit (aligned with fast_mvc tooling)
# Install: pip install pre-commit && pre-commit install && pre-commit install --hook-type post-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: git-log-recorder
        name: git-log-recorder
        entry: python3 _maint/scripts/git_log_recorder.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [post-commit]
