# Netlify deployment — https://docs.netlify.com/configure-builds/file-based-configuration/
# Connect this repo in the Netlify UI → Build: npm ci && npm run build, Publish: dist (or rely on this file).

[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Netlify injects URL / DEPLOY_PRIME_URL at build time; Vite + sitemap pick them up automatically.

# Hardening for static hosting.
# CSP allows: Vite-built assets, inline theme script, Lucide + Swagger UI from unpkg, Google Fonts, Petstore OpenAPI fetch, Netlify badge images.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://fonts.googleapis.com https://unpkg.com https://petstore.swagger.io https://cdn.jsdelivr.net; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
